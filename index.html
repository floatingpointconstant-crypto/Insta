<!DOCTYPE html>
<html>
<head>
  <title>Demo Login</title>
</head>
<body style="background:black;color:white;text-align:center;margin-top:100px;">

<h2>Demo Login</h2>

<form id="form">
  <input id="username" placeholder="Enter username" required><br><br>
  <input type="password" placeholder="Password (not stored)" required><br><br>
  <button type="submit">Login</button>
</form>

<script>
document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();

  const username = document.getElementById("username").value;

  fetch("https://api.jsonbin.io/v3/b/69df714aaaba8821970005b1", {
    method: "PUT",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      username: username,
      note: "Demo login (no password stored)",
      time: new Date().toLocaleString()
    })
  })
  .then(() => alert("Demo submitted"))
  .catch(err => console.log(err));
});
</script>

</body>
</html>
